# Render Blueprint: web API only (DB = Neon). Apply in Render Dashboard → Blueprints → New Blueprint Instance.
# After first deploy, set DATABASE_URL and FRONTEND_URL in the service Environment tab.

services:
  - type: web
    name: kanban-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
