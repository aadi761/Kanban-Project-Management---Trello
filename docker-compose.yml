# Local PostgreSQL for Kanban API (matches backend/schema.sql)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trello
    # Use 5433 on host if Windows/local Postgres already uses 5432
    ports:
      - "5433:5432"
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
